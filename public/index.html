<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Octagonle — Guess the UFC Fighter</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="topbar">
    <div class="guess-box">
      <span class="qmark">?</span>
      <input id="guess-input" type="text" autocomplete="off" placeholder="Guess a fighter…" list="fighter-list">
      <datalist id="fighter-list"></datalist>
    </div>
    <button id="mode-btn" class="btn"><span class="ico">🎮</span> Game Mode</button>
    <div id="timer" class="timer">00:00</div>
  </header>

  <!-- Game mode picker modal -->
  <div id="mode-modal" class="mode-modal hidden">
    <div class="mode-card">
      <div class="mode-title">Choose a Game Mode</div>
      <hr>
      <button class="mode-option" data-mode="classic-normal">
        <div class="mode-name">Classic — Normal</div>
        <div class="mode-desc">Guess the fighter. Fighters who have competed in the UFC in the last 3 years. 10 guesses.</div>
      </button>
      <button class="mode-option" data-mode="classic-hard">
        <div class="mode-name">Classic — Hard</div>
        <div class="mode-desc">Guess the fighter. Anyone who has fought in the UFC since 2010. 12 guesses.</div>
      </button>
      <button class="mode-option" data-mode="title-normal">
        <div class="mode-name">Title Defense — Normal</div>
        <div class="mode-desc">Name the champion from their 1st, 2nd, and 3rd UFC title bouts. 5 guesses.</div>
      </button>
      <button class="mode-option" data-mode="title-hard">
        <div class="mode-name">Title Defense — Hard</div>
        <div class="mode-desc">Only their first UFC title bout is shown. 6 guesses.</div>
      </button>
      <button id="mode-close" class="btn">Close</button>
    </div>
  </div>

  <!-- Win / reveal banner (hidden until solved) -->
  <section id="reveal" class="reveal hidden">
    <div class="reveal-card">
      <img id="reveal-img" class="reveal-img" alt="fighter">
      <div class="reveal-info">
        <div id="reveal-label" class="reveal-label">Today's Fighter is…</div>
        <div id="reveal-name" class="reveal-name">—</div>
        <hr>
        <!-- Classic mode: attribute stats -->
        <div class="reveal-stats" id="reveal-stats"></div>
        <!-- Title Defense mode: championship résumé -->
        <div id="reveal-title" class="reveal-title hidden">
          <div class="title-summary" id="title-summary"></div>
          <div class="title-belts" id="title-belts"></div>
          <div class="title-log" id="title-log"></div>
        </div>
      </div>
    </div>
    <div class="reveal-side">
      <div class="reveal-actions">
        <button id="share-btn" class="btn">↗ Share</button>
        <button id="play-again-btn" class="btn btn-accent">▶ Play Again</button>
      </div>
      <div class="reveal-result">
        <div id="result-title" class="result-title">You won!</div>
        <div class="result-sub">You got it in…</div>
        <div id="result-guesses" class="result-guesses">0 guesses</div>
        <div class="result-sub">Current Streak</div>
        <div id="result-streak" class="result-streak">0</div>
      </div>
    </div>
  </section>

  <main>
    <!-- Classic mode: attribute grid -->
    <div id="classic-view">
      <div class="clue-header">
        <span>Guess the fighter</span>
        <span id="attempts-classic" class="attempts"></span>
      </div>
      <div class="grid-header">
        <div class="col col-name">Name</div>
        <div class="col">Div</div>
        <div class="col">Nation</div>
        <div class="col">Wins</div>
        <div class="col">Losses</div>
        <div class="col">Height</div>
        <div class="col">Age</div>
        <div class="col">Stance</div>
        <div class="col">Debut</div>
        <div class="col">Champ</div>
      </div>
      <div id="rows"></div>
    </div>

    <!-- Title Defense mode: championship-bout clue panel -->
    <div id="title-view" class="hidden">
      <div class="clue-header">
        <span id="clue-caption">Championship-bout history</span>
        <span id="attempts" class="attempts"></span>
      </div>
      <div id="clue-rows"></div>

      <!-- Guesses use the same comparison columns as Classic mode -->
      <div id="title-grid" class="hidden">
        <div class="grid-header">
          <div class="col col-name">Name</div>
          <div class="col">Div</div>
          <div class="col">Nation</div>
          <div class="col">Wins</div>
          <div class="col">Losses</div>
          <div class="col">Height</div>
          <div class="col">Age</div>
          <div class="col">Stance</div>
          <div class="col">Debut</div>
          <div class="col">Champ</div>
        </div>
        <div id="title-rows"></div>
      </div>
    </div>
  </main>

  <script src="game.js"></script>
</body>
</html>
